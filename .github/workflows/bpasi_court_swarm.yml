name: BPASI Engine Courtroom Swarm

on:
  repository_dispatch:
    types: [wordpress_form_intake, live_courtroom_stream]
  workflow_dispatch:
    inputs:
      first_names:
        description: 'Litigant First Names'
        required: true
        default: 'Bobby'
      complaint_text:
        description: 'Public Irritation / Irregularity Narrative'
        required: true
        default: 'Systemic failure in tracking tender allocations regarding critical tech infrastructure.'
      session_id:
        description: 'Manual Test Session ID'
        required: false
        default: 'MANUAL-TEST-999'

jobs:
  execute-bpasi-core:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Explicitly locked onto GitHub's maximum 6-hour execution window

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Swarm Core Dependencies
        run: |
          pip install requests openai fpdf2

      - name: Execute BPASI Narrative Diagnostic Core
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_NIM_ENDPOINT: ${{ secrets.NVIDIA_NIM_ENDPOINT }}
          USER_FIRST_NAMES: ${{ github.event.client_payload.first_names || github.event.inputs.first_names }}
          USER_SURNAME: "Moahi"  # Hardlocked individual litigant identification
          RAW_COMPLAINT: ${{ github.event.client_payload.complaint_text || github.event.inputs.complaint_text }}
          WP_SESSION_ID: ${{ github.event.client_payload.session_id || github.event.inputs.session_id }}
          WP_TIMESTAMP: ${{ github.event.client_payload.timestamp || 'MANUAL-RUN' }}
        run: |
          python core_engine.py

      - name: Archive CaseLines Compliant PDF Dossier Bundle
        uses: actions/upload-artifact@v4
        with:
          name: CaseLines_Moahi_Court_Bundle
          path: "*.pdf"
          retention-days: 5
